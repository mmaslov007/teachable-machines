<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sentient Cardboard Box</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
            transition: background-color 0.5s ease;
        }
        #webcam-container {
            display: flex;
            justify-content: center;
        }
        #webcam-container canvas {
            display: none;
            border-radius: 8px;
        }
        #webcam-container.active canvas {
            display: block;
        }
        #box-container {
            position: relative;
            width: 100%;
            height: 200px;
            margin: 1rem 0;
        }
        #box {
            position: absolute;
            font-size: 150px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.3s ease, top 0.3s ease;
        }
        #label-container div {
            font-size: 1.1rem;
            padding: 0.25rem 0;
        }
        button {
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            color: white;
            background: #2563eb;
            margin: 1rem 0;
        }
        button.stop { background: #dc2626; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>✨ The Sentient Cardboard Box ✨</h1>

    <button id="toggleButton" onclick="toggleCamera()">Start Camera</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div id="message"></div>
    <div id="box-container">
        <div id="box">📦</div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        // REPLACE THIS with your model URL from Teachable Machine:
        const URL = "https://teachablemachine.withgoogle.com/models/m78adsZD6/";

        let model, webcam, labelContainer, maxPredictions;
        let isRunning = false;

        async function init() {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(300, 300, true);
            await webcam.setup();
            await webcam.play();

            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);
            container.classList.add("active");

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

            isRunning = true;
            window.requestAnimationFrame(loop);
        }

        async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);

            // Find the class with the highest probability
            let topClass = prediction[0];
            for (let i = 1; i < prediction.length; i++) {
                if (prediction[i].probability > topClass.probability) {
                    topClass = prediction[i];
                }
            }

            // topClass.className is the winning label
            // topClass.probability is how confident the model is
            console.log(topClass.className, topClass.probability);

            // Update the display
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }

            if (topClass.className === "Face" && topClass.probability > 0.8) {
              document.body.style.backgroundColor = "#4ade80"; // green
            } else if (topClass.className === "Blank" && topClass.probability > 0.8) {
              document.body.style.backgroundColor = "#f87171"; // red
            } else if (topClass.className === "Peace sign" && topClass.probability > 0.8) {
              document.body.style.backgroundColor = "#fbbf24"; // yellow
            } else if (topClass.className === "Phone" && topClass.probability > 0.8) {
              document.body.style.backgroundColor = "#808080"; // grey
            } else {
              document.body.style.backgroundColor = "white";
            }

            const messageEl = document.getElementById("message");

            if (topClass.className === "Face" && topClass.probability > 0.92) {
                messageEl.textContent = "Greetings human! I see you!";
            } else if (topClass.className === "Blank" && topClass.probability > 0.90){
                messageEl.textContent = "I can still see you... by other means...";
            } else if (topClass.className === "Peace sign" && topClass.probability > 0.90){
                messageEl.textContent = "Make peace with the box, and it will show you wonders!";
            } else if (topClass.className === "Phone" && topClass.probability > 0.90){
                messageEl.textContent = "Put down the thinking rock platter.";
            } else {
                messageEl.textContent = "";
            }

            const box = document.getElementById("box");
            if (topClass.className === "Face" && topClass.probability > 0.7) {
                box.style.left = "20%";
                box.style.top = "50%";
            } else if (topClass.className === "Peace sign" && topClass.probability > 0.7) {
                box.style.left = "50%";
                box.style.top = "70%";
            } else if (topClass.className === "Phone" && topClass.probability > 0.7) {
                box.style.left = "80%";
                box.style.top = "50%";
            } else {
                box.style.left = "50%";
                box.style.top = "50%";
            }
        }

        async function toggleCamera() {
            const button = document.getElementById("toggleButton");
            if (!isRunning) {
                await init();
                button.textContent = "Stop Camera";
                button.classList.add("stop");
            } else {
                isRunning = false;
                webcam.stop();
                document.getElementById("webcam-container").classList.remove("active");
                button.textContent = "Start Camera";
                button.classList.remove("stop");
            }
        }
    </script>
</body>
</html>
